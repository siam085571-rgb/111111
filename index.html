<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>LOL - অ্যাডমিন প্যানেল</title>
    <style>
        body { background: #090d16; color: #fff; font-family: sans-serif; padding: 50px; text-align: center;}
        .box { max-width: 500px; margin: 0 auto; background: #151f32; padding: 30px; border-radius: 12px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; }
        button { background: #06b6d4; color: #fff; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #0891b2; }
        #status { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ভিডিও লিংক ম্যানেজার</h2>
        <p style="color: #94a3b8; font-size: 13px;">এখানে লিংক পেস্ট করলে তা সরাসরি গিটহাব রেপোতে আপডেট হবে</p>
        <input type="url" id="videoUrl" placeholder="https://example.com/video">
        <button onclick="addLink()">লিংক যুক্ত করুন</button>
        <div id="status"></div>
    </div>

    <script>
        async function addLink() {
            const urlInput = document.getElementById('videoUrl');
            const status = document.getElementById('status');
            const url = urlInput.value.trim();

            if(!url) return alert('অনুগ্রহ করে একটি সঠিক লিংক দিন');

            status.innerText = "গিটহাবে সেভ হচ্ছে...";
            status.style.color = "#e2e8f0";

            try {
                const response = await fetch('/api/videos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const result = await response.json();
                
                if(response.ok) {
                    status.innerText = result.message;
                    status.style.color = "#4ade80";
                    urlInput.value = "";
                } else {
                    status.innerText = result.error;
                    status.style.color = "#f87171";
                }
            } catch (err) {
                status.innerText = "সার্ভার এরর!";
                status.style.color = "#f87171";
            }
        }
    </script>
</body>
</html>
