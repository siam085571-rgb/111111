<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL - অ্যাডমিন কন্ট্রোল প্যানেল</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 40px 20px; display: flex; justify-content: center; }
        .admin-box { width: 100%; max-width: 600px; background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { margin-bottom: 20px; text-align: center; color: #38bdf8; }
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input[type="text"] { flex: 1; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { padding: 12px 20px; background: #0284c7; border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0369a1; }
        .link-list { list-style: none; margin-bottom: 20px; max-height: 300px; overflow-y: auto; }
        .link-item { display: flex; justify-content: space-between; align-items: center; background: #334155; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        .link-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
        .delete-btn { background: #ef4444; padding: 6px 12px; font-size: 12px; }
        .delete-btn:hover { background: #b91c1c; }
        .save-btn { width: 100%; background: #22c55e; font-size: 16px; }
        .save-btn:hover { background: #16a34a; }
        #status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>LOL ভিডিও ম্যানেজার</h2>
        
        <div class="input-group">
            <input type="text" id="newLink" placeholder="নতুন ভিডিওর ইউআরএল (URL) দিন...">
            <button onclick="addLink()">যোগ করুন</button>
        </div>

        <ul class="link-list" id="linkList">
            <!-- জাভাস্ক্রিপ্ট দিয়ে লিংক লোড হবে -->
        </ul>

        <button class="save-btn" onclick="saveChanges()">পরিবর্তনগুলো গিটহাবে সেভ করুন</button>
        <p id="status"></p>
    </div>

    <script>
        let currentLinks = [];

        // সার্ভার থেকে লিংক লোড করা
        async function fetchLinks() {
            showStatus('লিংক লোড হচ্ছে...', '#38bdf8');
            try {
                const res = await fetch('/api/links');
                const data = await res.json();
                if(data.success) {
                    currentLinks = data.links;
                    renderLinks();
                    showStatus('লিংক সফলভাবে লোড হয়েছে', '#22c55e');
                } else {
                    showStatus('ডাটা আনতে সমস্যা হয়েছে', '#ef4444');
                }
            } catch (err) {
                showStatus('সার্ভার কানেকশন ত্রুটি!', '#ef4444');
            }
        }

        // স্ক্রিনে লিংকগুলোর লিস্ট দেখানো
        function renderLinks() {
            const list = document.getElementById('linkList');
            list.innerHTML = '';
            currentLinks.forEach((link, index) => {
                const li = document.createElement('li');
                li.className = 'link-item';
                li.innerHTML = `
                    <span>${link}</span>
                    <button class="delete-btn" onclick="deleteLink(${index})">ডিলিট</button>
                `;
                list.appendChild(li);
            });
        }

        // লোকাল অ্যারেতে নতুন লিংক যোগ করা
        function addLink() {
            const input = document.getElementById('newLink');
            const url = input.value.trim();
            if(!url) return;
            
            currentLinks.push(url);
            renderLinks();
            input.value = '';
        }

        // লোকাল অ্যারে থেকে লিংক বাদ দেওয়া
        function deleteLink(index) {
            currentLinks.splice(index, 1);
            renderLinks();
        }

        // গিটহাবে সেভ করার রিকোয়েস্ট পাঠানো
        async function saveChanges() {
            showStatus('গিটহাবে সেভ হচ্ছে... অপেক্ষা করুন...', '#38bdf8');
            try {
                const res = await fetch('/api/links', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ links: currentLinks })
                });
                const data = await res.json();
                if(data.success) {
                    showStatus('দারুণ! গিটহাবে ফাইল আপডেট হয়েছে।', '#22c55e');
                } else {
                    showStatus('সেভ করতে ব্যর্থ: ' + data.message, '#ef4444');
                }
            } catch (err) {
                showStatus('সার্ভার ত্রুটি!', '#ef4444');
            }
        }

        function showStatus(text, color) {
            const status = document.getElementById('status');
            status.innerText = text;
            status.style.color = color;
        }

        // পেজ লোড হলেই রান হবে
        fetchLinks();
    </script>
</body>
</html>
